name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.x
            10.x

      - name: Restore
        run: dotnet restore MqttControllerFramework.slnx

      - name: Build
        run: dotnet build MqttControllerFramework.slnx -c Release --no-restore

      - name: Test
        run: dotnet test MqttControllerFramework.slnx -c Release --no-build -v q
